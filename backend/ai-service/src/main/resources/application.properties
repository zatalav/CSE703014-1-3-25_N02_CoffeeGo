server.port=8091
spring.application.name=ai-service

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4000,http://localhost:8080}
app.jwt.secret=${JWT_SECRET:coffee-chain-management-secret-key-change-me-in-production-2026}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:120}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}

app.ai.provider-url=${AI_PROVIDER_URL:https://api.openai.com/v1/chat/completions}
app.ai.api-key=${AI_API_KEY:}
app.ai.model=${AI_MODEL:gpt-4o-mini}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
