server.port=8080
spring.application.name=api-gateway

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
app.jwt.secret=${JWT_SECRET:coffee-chain-management-secret-key-change-me-in-production-2026}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:120}

app.routes.auth-service=${AUTH_SERVICE_URL:http://localhost:8081}
app.routes.user-service=${USER_SERVICE_URL:http://localhost:8082}
app.routes.branch-service=${BRANCH_SERVICE_URL:http://localhost:8083}
app.routes.product-service=${PRODUCT_SERVICE_URL:http://localhost:8084}
app.routes.inventory-service=${INVENTORY_SERVICE_URL:http://localhost:8085}
app.routes.order-service=${ORDER_SERVICE_URL:http://localhost:8086}
app.routes.customer-service=${CUSTOMER_SERVICE_URL:http://localhost:8087}
app.routes.promotion-service=${PROMOTION_SERVICE_URL:http://localhost:8088}
app.routes.content-service=${CONTENT_SERVICE_URL:http://localhost:8089}
app.routes.report-service=${REPORT_SERVICE_URL:http://localhost:8090}
app.routes.ai-service=${AI_SERVICE_URL:http://localhost:8091}
app.frontend.customer-url=${CUSTOMER_WEB_URL:http://localhost:5181}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
